# =====================================================================
# publish_doc.yml — Publica documentación en GitHub Pages
# GRATIS — solo usa GITHUB_TOKEN (automático, no necesitas configurar nada)
# URL resultante: https://upt-faing-epis.github.io/examen-2026-i-pds-u1-Ankluna72/
# =====================================================================
name: Publish Documentation

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: 📚 Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore & Build (generates XML docs)
        working-directory: backend
        run: |
          dotnet restore GymManagement.sln
          dotnet build GymManagement.sln -c Release \
            /p:GenerateDocumentationFile=true \
            --no-restore

      - name: Create DocFX config
        run: |
          cat > docfx.json << 'DOCFX_EOF'
          {
            "metadata": [
              {
                "src": [{ "files": ["backend/src/**/*.csproj"] }],
                "dest": "_api",
                "includePrivateMembers": false
              }
            ],
            "build": {
              "content": [
                { "files": ["_api/**.yml", "_api/index.md"] },
                { "files": ["README.md", "docs/*.md"] }
              ],
              "output": "_site",
              "globalMetadata": {
                "_appName": "GymPro — Sistema de Gestión de Gimnasio",
                "_appTitle": "GymPro API Docs",
                "_enableSearch": true,
                "_appFooter": "GymPro © 2026 — Ankluna72 — PDS UPT FAING EPIS"
              },
              "template": ["default", "modern"]
            }
          }
          DOCFX_EOF

      - name: Build documentation site
        run: docfx docfx.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-docs:
    name: 🚀 Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print URL
        run: echo "📚 Docs URL ${{ steps.deployment.outputs.page_url }}"
