# =====================================================================
# deploy_app.yml — Deploy GRATUITO
# Frontend  → GitHub Pages via publish_doc.yml (mismo sitio que la docs)
# Backend   → Render.com (GRATIS, auto-deploy via render.yaml)
# Este workflow: corre tests + build del frontend + trigger Render.com
# =====================================================================
name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'render.yaml'
      - '.github/workflows/deploy_app.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-app"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Tests del backend
  # ────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        working-directory: backend
        run: dotnet restore GymManagement.sln

      - name: Build solution
        working-directory: backend
        run: dotnet build GymManagement.sln -c Release --no-restore /p:NoWarn=CS1591

      - name: Run Unit Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.UnitTests/GymManagement.UnitTests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=minimal"

      - name: Run Integration Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.IntegrationTests/GymManagement.IntegrationTests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=minimal"

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Build Frontend (verification only)
  # El deploy a Pages lo maneja publish_doc.yml para evitar conflictos
  # ────────────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend (verification)
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}
          VITE_BASE_PATH: /examen-2026-i-pds-u1-Ankluna72/

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Print build success
        run: echo "✅ Frontend built successfully. Deploy is handled by publish_doc.yml"

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Deploy Backend → Render.com (GRATIS)
  # render.yaml auto-deploys on push. Este job notifica si hay deploy hook.
  # ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render.com
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render.com deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "🚀 Triggering Render.com deployment..."
            curl -s --fail-with-body \
              "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -X POST
            echo "✅ Render.com deploy triggered successfully"
          else
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL not set — Render.com auto-deploys via render.yaml"
            echo "   Backend URL: ${{ vars.RENDER_BACKEND_URL }}"
          fi
