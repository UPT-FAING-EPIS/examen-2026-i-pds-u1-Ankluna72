# =====================================================================
# deploy_app.yml — Deploy Frontend & Backend Applications
# Backend → Azure App Service (Docker)
# Frontend → Azure Static Web Apps
# =====================================================================
name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy_app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: gym-api
  FRONTEND_APP_NAME: ${{ secrets.AZURE_STATIC_WEB_APP_NAME }}

jobs:
  # ── Test ─────────────────────────────────────────────────────────
  test-backend:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore GymManagement.sln

      - name: Build
        working-directory: backend
        run: dotnet build GymManagement.sln -c Release --no-restore

      - name: Run Unit Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.UnitTests/GymManagement.UnitTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect:"XPlat Code Coverage"

      - name: Run Integration Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.IntegrationTests/GymManagement.IntegrationTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-tests.trx"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Test Results
          path: backend/**/*.trx
          reporter: dotnet-trx

  # ── Build & Push Backend Image ────────────────────────────────────
  build-backend:
    name: Build & Push Backend Docker Image
    needs: test-backend
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy Backend ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Azure App Service
    needs: build-backend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Wait for deployment
        run: sleep 30

      - name: Health Check
        run: |
          curl -f https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || \
          echo "Health check failed - app may still be starting"

  # ── Build & Deploy Frontend ───────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    needs: test-backend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
