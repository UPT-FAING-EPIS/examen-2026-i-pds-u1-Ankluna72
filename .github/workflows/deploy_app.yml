# =====================================================================
# deploy_app.yml — Deploy GRATUITO
# Frontend  → GitHub Pages (GRATIS, sin secrets adicionales)
# Backend   → Render.com  (GRATIS, 1 solo secret: RENDER_DEPLOY_HOOK_URL)
# Base datos → Render.com PostgreSQL (GRATIS, configurado en render.yaml)
# =====================================================================
name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'render.yaml'
      - '.github/workflows/deploy_app.yml'
  workflow_dispatch:

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Tests del backend
  # ────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        working-directory: backend
        run: dotnet restore GymManagement.sln

      - name: Build solution
        working-directory: backend
        run: dotnet build GymManagement.sln -c Release --no-restore

      - name: Run Unit Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.UnitTests/GymManagement.UnitTests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=minimal"

      - name: Run Integration Tests
        working-directory: backend
        run: |
          dotnet test tests/GymManagement.IntegrationTests/GymManagement.IntegrationTests.csproj \
            -c Release --no-build \
            --logger "console;verbosity=minimal"

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Deploy Frontend → GitHub Pages (GRATIS, automático)
  # No necesita ningún secret extra — usa GITHUB_TOKEN automático
  # ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → GitHub Pages
    needs: test-backend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build
        env:
          # URL del backend en Render.com — sin trailing slash
          # Ejemplo: https://gym-management-api.onrender.com
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}
          # Base path para GitHub Pages = /nombre-del-repo/
          VITE_BASE_PATH: /examen-2026-i-pds-u1-Ankluna72/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: echo "✅ Frontend URL: ${{ steps.deployment.outputs.page_url }}"

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Deploy Backend → Render.com (GRATIS)
  # Solo necesita 1 secret: RENDER_DEPLOY_HOOK_URL
  # Lo obtienes en: Dashboard de Render → tu servicio → Settings → Deploy Hook
  # ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render.com
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render.com deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "🚀 Triggering Render.com deployment..."
            curl -s --fail-with-body \
              "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -X POST
            echo "✅ Render.com deploy triggered successfully"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set."
            echo "    Para configurar el deploy automático:"
            echo "    1. Ve a https://dashboard.render.com"
            echo "    2. Selecciona tu servicio gym-management-api"
            echo "    3. Settings → Deploy Hook → Copiar URL"
            echo "    4. Agregar como secret RENDER_DEPLOY_HOOK_URL en GitHub"
          fi
