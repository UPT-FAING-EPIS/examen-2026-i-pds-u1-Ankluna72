# =====================================================================
# publish_doc.yml — Build docs + frontend y despliega en GitHub Pages
# URL: https://upt-faing-epis.github.io/examen-2026-i-pds-u1-Ankluna72/
# GRATIS — solo usa GITHUB_TOKEN (automático, no necesitas configurar nada)
# =====================================================================
name: Publish Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: 📚 Build Site (Docs + Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Frontend React ──────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}
          VITE_BASE_PATH: /examen-2026-i-pds-u1-Ankluna72/app/

      # ── Setup .NET for DocFX ──────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore backend
        working-directory: backend
        run: dotnet restore GymManagement.sln

      - name: Build backend (generates XML docs)
        working-directory: backend
        run: |
          dotnet build GymManagement.sln -c Release \
            --no-restore \
            /p:GenerateDocumentationFile=true \
            /p:NoWarn=CS1591
        continue-on-error: true

      # ── Create DocFX config ───────────────────────────────────────
      - name: Create DocFX configuration
        run: |
          mkdir -p _api_meta
          cat > docfx.json << 'DOCFX_EOF'
          {
            "metadata": [
              {
                "src": [
                  {
                    "files": [
                      "backend/src/GymManagement.Domain/GymManagement.Domain.csproj",
                      "backend/src/GymManagement.Application/GymManagement.Application.csproj",
                      "backend/src/GymManagement.Infrastructure/GymManagement.Infrastructure.csproj",
                      "backend/src/GymManagement.API/GymManagement.API.csproj"
                    ]
                  }
                ],
                "dest": "_api_meta",
                "allowCompilationErrors": true
              }
            ],
            "build": {
              "content": [
                { "files": ["_api_meta/**.yml", "_api_meta/index.md"] },
                { "files": ["README.md", "docs/*.md"], "src": "." }
              ],
              "output": "_site",
              "globalMetadata": {
                "_appName": "GymPro — Sistema de Gestión de Gimnasio",
                "_appTitle": "GymPro Docs",
                "_enableSearch": true,
                "_appFooter": "GymPro © 2026 — Ankluna72 — PDS UPT FAING EPIS"
              },
              "template": ["default", "modern"]
            }
          }
          DOCFX_EOF

      - name: Generate DocFX metadata
        run: docfx metadata docfx.json
        continue-on-error: true

      - name: Build DocFX documentation site
        run: docfx build docfx.json
        continue-on-error: true

      # ── Build fallback minimal site if DocFX failed ───────────────
      - name: Ensure _site exists with minimal content
        run: |
          mkdir -p _site
          if [ ! -f "_site/index.html" ]; then
            echo "⚠️ DocFX did not generate a site — creating minimal HTML site..."
            cat > _site/index.html << 'HTML_EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>GymPro — Sistema de Gestión de Gimnasio</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:Inter,sans-serif;background:#0a0a0f;color:#f1f0ff;min-height:100vh}
              header{background:linear-gradient(135deg,#6366f1,#4f46e5);padding:48px 20px;text-align:center}
              header h1{font-size:2.8rem;font-weight:900;letter-spacing:-1px}
              header p{opacity:.85;margin-top:10px;font-size:1.1rem}
              .hero-links{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
              .hero-btn{padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;transition:.2s}
              .btn-white{background:#fff;color:#4f46e5}
              .btn-outline{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
              main{max-width:960px;margin:40px auto;padding:0 20px}
              .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:32px}
              .card{background:#18181f;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px}
              .card h2{font-size:1rem;font-weight:700;color:#818cf8;margin-bottom:14px;display:flex;align-items:center;gap:8px}
              table{width:100%;border-collapse:collapse;font-size:13px}
              th,td{text-align:left;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
              th{color:#5a5a72;font-size:11px;text-transform:uppercase;letter-spacing:1px}
              .badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
              .get{background:rgba(59,130,246,.2);color:#60a5fa}
              .post{background:rgba(16,185,129,.2);color:#34d399}
              code{background:#1f1f28;padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace}
              a{color:#818cf8}
              .solid-badge{display:inline-block;width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#6366f1,#f59e0b);color:#fff;font-weight:900;font-size:12px;text-align:center;line-height:24px;margin-right:8px}
            </style>
          </head>
          <body>
            <header>
              <h1>🏋️ GymPro</h1>
              <p>Sistema de Gestión de Gimnasio — Documentación del Proyecto</p>
              <div class="hero-links">
                <a class="hero-btn btn-white" href="app/">🌐 Abrir Aplicación</a>
                <a class="hero-btn btn-outline" href="https://github.com/UPT-FAING-EPIS/examen-2026-i-pds-u1-Ankluna72">📦 Repositorio</a>
                <a class="hero-btn btn-outline" href="https://gym-management-api.onrender.com/swagger">⚙️ API Swagger</a>
              </div>
            </header>
            <main>
              <div class="grid">
                <div class="card">
                  <h2>🔗 API Endpoints</h2>
                  <table>
                    <thead><tr><th>Método</th><th>Endpoint</th><th>Descripción</th></tr></thead>
                    <tbody>
                      <tr><td><span class="badge post">POST</span></td><td><code>/api/clients</code></td><td>Registrar cliente</td></tr>
                      <tr><td><span class="badge get">GET</span></td><td><code>/api/clients/{id}</code></td><td>Obtener cliente</td></tr>
                      <tr><td><span class="badge post">POST</span></td><td><code>/api/memberships</code></td><td>Nueva membresía</td></tr>
                      <tr><td><span class="badge get">GET</span></td><td><code>/api/memberships/{id}</code></td><td>Ver membresía</td></tr>
                      <tr><td><span class="badge post">POST</span></td><td><code>/api/memberships/{id}/renew</code></td><td>Renovar membresía</td></tr>
                      <tr><td><span class="badge post">POST</span></td><td><code>/api/workout-sessions</code></td><td>Nueva sesión</td></tr>
                      <tr><td><span class="badge get">GET</span></td><td><code>/api/clients/{id}/workout-sessions</code></td><td>Sesiones del cliente</td></tr>
                      <tr><td><span class="badge get">GET</span></td><td><code>/api/clients/{id}/memberships</code></td><td>Membresías del cliente</td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="card">
                  <h2>🏗️ Principios SOLID</h2>
                  <table>
                    <tbody>
                      <tr><td><span class="solid-badge">S</span>SRP</td><td>Controller / Service / Repository tienen una sola responsabilidad</td></tr>
                      <tr><td><span class="solid-badge">O</span>OCP</td><td>Interfaces permiten extensión sin modificar código existente</td></tr>
                      <tr><td><span class="solid-badge">L</span>LSP</td><td>Repositorios sustituibles por sus abstracciones</td></tr>
                      <tr><td><span class="solid-badge">I</span>ISP</td><td>IClientRepository, IMembershipRepository segregadas</td></tr>
                      <tr><td><span class="solid-badge">D</span>DIP</td><td>Services dependen de interfaces, no implementaciones</td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="card">
                  <h2>🛠️ Stack Tecnológico</h2>
                  <table>
                    <tbody>
                      <tr><td>Backend</td><td>.NET Core 8, ASP.NET Web API</td></tr>
                      <tr><td>Frontend</td><td>React 18 + Vite + TypeScript</td></tr>
                      <tr><td>Base de datos</td><td>PostgreSQL 15</td></tr>
                      <tr><td>ORM</td><td>Entity Framework Core 8</td></tr>
                      <tr><td>IaC</td><td>Terraform + render.yaml</td></tr>
                      <tr><td>CI/CD</td><td>GitHub Actions (6 workflows)</td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="card">
                  <h2>🔗 URLs del Proyecto</h2>
                  <table>
                    <tbody>
                      <tr><td>🌐 Aplicación</td><td><a href="app/">GitHub Pages (este sitio)</a></td></tr>
                      <tr><td>⚙️ Backend API</td><td><a href="https://gym-management-api.onrender.com">Render.com</a></td></tr>
                      <tr><td>📖 Swagger</td><td><a href="https://gym-management-api.onrender.com/swagger">Swagger UI</a></td></tr>
                      <tr><td>📦 Repositorio</td><td><a href="https://github.com/UPT-FAING-EPIS/examen-2026-i-pds-u1-Ankluna72">GitHub</a></td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </main>
          </body>
          </html>
          HTML_EOF
          else
            echo "✅ DocFX site generated successfully."
          fi

      # ── Copy frontend build into /app subfolder of the Pages site ─
      - name: Copy frontend into site/app/
        run: |
          mkdir -p _site/app
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist/. _site/app/
            echo "✅ Frontend app copied to _site/app/"
            ls -la _site/app/ | head -10
          else
            echo "⚠️ frontend/dist not found, creating placeholder..."
            cat > _site/app/index.html << 'APP_PLACEHOLDER'
          <!DOCTYPE html><html><head><meta charset="UTF-8" /><title>GymPro App</title>
          <style>body{font-family:Inter,sans-serif;background:#0a0a0f;color:#f1f0ff;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
          </style></head><body><h1>🏋️ GymPro</h1><p>Frontend build not available in this run.</p>
          <a href="../" style="color:#818cf8">← Volver a la documentación</a></body></html>
          APP_PLACEHOLDER
          fi

      # ── Deploy to GitHub Pages ─────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print URLs
        run: |
          echo "📚 Documentación: ${{ steps.deployment.outputs.page_url }}"
          echo "🌐 Aplicación: ${{ steps.deployment.outputs.page_url }}app/"
          echo "⚙️ Backend API: ${{ vars.RENDER_BACKEND_URL }}"
